<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE DEVOURING GATE — GHOST v9.0.9</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --void:#05050a; --panel:#0d0d14; --panel2:#12121e;
      --gold:#c8a84b; --gold-dim:#7a6228; --gold-bright:#ffd700;
      --parchment:#e8e4d9; --parchment-dim:#7a7770;
      --aqua:#5fffd4; --crimson:#c0392b; --crimson-b:#f44336;
      --cobalt:#4a90d9; --solar:#ffd700; --border:#1a1a26;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--void);color:var(--parchment);font-family:'Space Mono',monospace;min-height:100vh;overflow-x:hidden;}

    /* Header */
    .header{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;border-bottom:1px solid var(--gold-dim);}
    .h-left,.h-right{display:flex;flex-direction:column;gap:3px;}
    .h-right{align-items:flex-end;}
    .h-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.45em;color:var(--gold);}
    .h-sub{font-size:9px;letter-spacing:.3em;color:var(--parchment-dim);}
    .h-logo{font-family:'Cinzel',serif;font-size:28px;font-weight:900;color:var(--gold);letter-spacing:.2em;text-shadow:0 0 30px rgba(200,168,75,.4);}

    /* Main */
    .main{max-width:820px;margin:0 auto;padding:40px 24px 80px;}

    /* Taotie */
    .taotie-wrap{display:flex;justify-content:center;margin-bottom:28px;}
    .taotie-svg{width:200px;height:160px;}
    .taotie-idle .eye-iris{animation:eyePulse 3.5s ease-in-out infinite;}
    @keyframes eyePulse{0%,100%{opacity:.6}50%{opacity:1}}
    @keyframes admitFlash{0%,100%{filter:drop-shadow(0 0 0 transparent)}50%{filter:drop-shadow(0 0 22px #c8a84b)}}
    @keyframes rejectFlash{0%,100%{filter:drop-shadow(0 0 0 transparent)}50%{filter:drop-shadow(0 0 22px #c0392b)}}
    .taotie-admit{animation:admitFlash .9s ease;}
    .taotie-reject{animation:rejectFlash .9s ease;}

    /* Orbital */
    .orbital-row{display:flex;align-items:center;justify-content:center;gap:32px;margin-bottom:40px;}
    .orbital-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.35em;color:var(--gold-dim);text-align:center;margin-top:8px;}
    .orbital-stats{font-size:11px;color:var(--parchment-dim);line-height:2.1;}
    .orbital-stats .sv{color:var(--aqua);font-weight:700;}

    /* Input */
    .input-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.5em;color:var(--gold);display:block;margin-bottom:12px;}
    textarea{width:100%;min-height:130px;background:var(--panel);border:1px solid var(--border);border-radius:3px;color:var(--parchment);font-family:'Space Mono',monospace;font-size:13px;padding:16px;resize:vertical;outline:none;transition:border-color .3s;line-height:1.65;}
    textarea:focus{border-color:var(--gold-dim);}
    textarea::placeholder{color:#2e2e3e;}
    .btn-row{display:flex;gap:14px;margin-top:14px;}
    .btn-devour{flex:1;padding:14px 24px;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:.4em;cursor:pointer;transition:all .2s;position:relative;}
    .btn-devour:hover{background:var(--gold);color:var(--void);}
    .btn-devour.loading{opacity:.5;pointer-events:none;}
    .btn-void{padding:14px 20px;background:transparent;border:1px solid #1e1e2e;color:var(--parchment-dim);font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3em;cursor:pointer;transition:all .2s;}
    .btn-void:hover{border-color:var(--crimson);color:var(--crimson);}

    /* Divider */
    .divider{display:flex;align-items:center;gap:16px;margin:32px 0;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .divider span{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5em;color:var(--gold-dim);}

    /* Mu row */
    .mu-row{display:flex;align-items:center;gap:0;padding:20px 24px;background:var(--panel);border-radius:3px;margin-bottom:20px;border:1px solid var(--border);}
    .mu-block{flex:1;border-right:1px solid var(--border);padding-right:24px;margin-right:24px;}
    .mu-block:last-child{border-right:none;padding-right:0;margin-right:0;}
    .mu-key{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.4em;color:var(--parchment-dim);margin-bottom:6px;}
    .mu-val{font-size:28px;font-weight:700;color:var(--gold);}
    .tau-val{font-size:16px;font-weight:700;color:var(--parchment-dim);}
    .verdict-val{font-family:'Cinzel',serif;font-size:12px;font-weight:600;letter-spacing:.25em;}
    .verdict-val.admit{color:var(--gold);}
    .verdict-val.reject{color:var(--crimson-b);}

    /* Domain bars */
    .domain-grid{display:flex;flex-direction:column;gap:11px;margin-bottom:24px;}
    .drow{display:grid;grid-template-columns:120px 1fr 88px;align-items:center;gap:14px;font-size:11px;}
    .dname{color:var(--parchment-dim);}
    .dbar-wrap{height:5px;background:#141420;border-radius:3px;overflow:hidden;position:relative;}
    .dbar{height:100%;border-radius:3px;width:0;transition:width .7s cubic-bezier(.4,0,.2,1);}
    .dbar.pass{background:linear-gradient(90deg,var(--gold-dim),var(--gold));}
    .dbar.fail{background:linear-gradient(90deg,#4a0a0a,var(--crimson));}
    .dtau{position:absolute;top:0;height:100%;width:1px;background:rgba(255,255,255,.18);}
    .dscore{text-align:right;font-size:10px;font-weight:700;}
    .dscore.pass{color:var(--gold);}
    .dscore.fail{color:var(--crimson-b);}

    /* Result */
    .result-banner{display:none;padding:18px 22px;border-radius:3px;margin-bottom:20px;border:1px solid;animation:fadeIn .4s ease;}
    .result-banner.admit{background:rgba(200,168,75,.04);border-color:var(--gold);}
    .result-banner.reject{background:rgba(192,57,43,.04);border-color:var(--crimson);}
    .result-title{font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:.3em;margin-bottom:10px;}
    .result-banner.admit .result-title{color:var(--gold-bright);}
    .result-banner.reject .result-title{color:var(--crimson-b);}
    .result-meta{display:flex;gap:20px;flex-wrap:wrap;font-size:10px;}
    .rk{color:var(--parchment-dim);letter-spacing:.1em;}
    .rv{font-weight:700;}
    .badge{display:inline-block;padding:2px 7px;border-radius:2px;font-size:9px;font-weight:700;letter-spacing:.15em;}
    .badge.stm{background:rgba(74,144,217,.15);color:var(--cobalt);border:1px solid var(--cobalt);}
    .badge.ltm{background:rgba(255,215,0,.08);color:var(--solar);border:1px solid var(--solar);}

    /* Offerings */
    .offerings-list{display:flex;flex-direction:column;gap:7px;max-height:300px;overflow-y:auto;}
    .o-item{display:grid;grid-template-columns:100px 80px 1fr 90px;align-items:center;gap:12px;padding:10px 14px;background:var(--panel);border-radius:3px;border-left:2px solid;font-size:10px;animation:slideIn .3s ease;}
    .o-item.admit{border-color:var(--gold-dim);}
    .o-item.reject{border-color:var(--crimson);opacity:.65;}
    .o-mu{font-weight:700;}
    .o-item.admit .o-mu{color:var(--gold);}
    .o-item.reject .o-mu{color:var(--crimson);}
    .o-preview{color:var(--parchment-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .o-time{color:#30303e;text-align:right;}

    /* Status bar */
    .sbar{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,20,.95);border-top:1px solid var(--border);padding:8px 40px;display:flex;gap:32px;font-size:10px;color:var(--parchment-dim);backdrop-filter:blur(4px);}
    .sbar .sdot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--aqua);margin-right:5px;animation:blink 2s infinite;}
    .sbar .sv{color:var(--aqua);}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
    @keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}

    .error-note{display:none;padding:10px 14px;background:rgba(192,57,43,.1);border:1px solid var(--crimson);border-radius:3px;font-size:11px;color:var(--crimson);margin-bottom:14px;}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px;}
  </style>
</head>
<body>

<header class="header">
  <div class="h-left">
    <div class="h-title">The Devouring Gate</div>
    <div class="h-sub">Coherence Calculus v3.0.9</div>
  </div>
  <div class="h-logo">GHOST</div>
  <div class="h-right">
    <div class="h-title">Harmony Labs</div>
    <div class="h-sub">FACE :7766</div>
  </div>
</header>

<main class="main">

  <!-- Taotie Mask -->
  <div class="taotie-wrap">
    <svg class="taotie-svg taotie-idle" id="taotie" viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="8" width="184" height="144" rx="3" stroke="#3a2e14" stroke-width="1" fill="none"/>
      <!-- Corner glyphs -->
      <line x1="8" y1="28" x2="28" y2="8" stroke="#c8a84b" stroke-width="1"/>
      <line x1="172" y1="8" x2="192" y2="28" stroke="#c8a84b" stroke-width="1"/>
      <line x1="8" y1="132" x2="28" y2="152" stroke="#c8a84b" stroke-width="1"/>
      <line x1="172" y1="152" x2="192" y2="132" stroke="#c8a84b" stroke-width="1"/>
      <!-- Horns -->
      <polygon points="78,8 65,30 91,30" fill="#0d0d14" stroke="#c8a84b" stroke-width="1.2"/>
      <polygon points="122,8 109,30 135,30" fill="#0d0d14" stroke="#c8a84b" stroke-width="1.2"/>
      <!-- Ear tendrils -->
      <path d="M8 72 Q2 62 6 48 Q10 62 14 72" stroke="#7a6228" stroke-width="1" fill="none"/>
      <path d="M192 72 Q198 62 194 48 Q190 62 186 72" stroke="#7a6228" stroke-width="1" fill="none"/>
      <!-- Left eye -->
      <circle cx="68" cy="82" r="32" stroke="#c8a84b" stroke-width="1.2" fill="#080810"/>
      <circle cx="68" cy="82" r="22" stroke="#7a6228" stroke-width=".8" fill="#05050a"/>
      <circle class="eye-iris" cx="68" cy="82" r="13" fill="#1a1008" stroke="#c8a84b" stroke-width="1"/>
      <circle cx="68" cy="82" r="6" fill="#c8a84b"/>
      <circle cx="71" cy="79" r="2" fill="#ffd700"/>
      <!-- Right eye -->
      <circle cx="132" cy="82" r="32" stroke="#c8a84b" stroke-width="1.2" fill="#080810"/>
      <circle cx="132" cy="82" r="22" stroke="#7a6228" stroke-width=".8" fill="#05050a"/>
      <circle class="eye-iris" cx="132" cy="82" r="13" fill="#1a1008" stroke="#c8a84b" stroke-width="1"/>
      <circle cx="132" cy="82" r="6" fill="#c8a84b"/>
      <circle cx="135" cy="79" r="2" fill="#ffd700"/>
      <!-- Nose bridge -->
      <rect x="95" y="58" width="10" height="44" rx="2" fill="none" stroke="#5a4820" stroke-width=".8"/>
      <!-- Brow lines -->
      <path d="M36 54 Q68 44 100 50" stroke="#5a4820" stroke-width=".8" fill="none"/>
      <path d="M164 54 Q132 44 100 50" stroke="#5a4820" stroke-width=".8" fill="none"/>
      <!-- Jaw base -->
      <path d="M36 122 Q100 142 164 122" stroke="#5a4820" stroke-width=".8" fill="none"/>
      <!-- Center symmetry axis (dashed) -->
      <line x1="100" y1="20" x2="100" y2="46" stroke="#3a2e14" stroke-width=".5" stroke-dasharray="2,3"/>
      <line x1="100" y1="118" x2="100" y2="146" stroke="#3a2e14" stroke-width=".5" stroke-dasharray="2,3"/>
    </svg>
  </div>

  <!-- Orbital W_v3 -->
  <div class="orbital-row">
    <div>
      <canvas id="orb" width="200" height="200"></canvas>
      <div class="orbital-label">WHITLOCK COEFFICIENT</div>
    </div>
    <div class="orbital-stats">
      <div>n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;= <span class="sv" id="sn">—</span></div>
      <div>|W_v3| = <span class="sv" id="sw">—</span></div>
      <div>&#x3C6;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;= <span class="sv" id="sphi">—</span>°</div>
      <div>&#x3C4;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;= <span class="sv" id="stau">—</span></div>
      <div>phase = <span class="sv" id="sphase">—</span></div>
    </div>
  </div>

  <!-- Input -->
  <div style="margin-bottom:28px">
    <label class="input-label" for="dinput">Feed the Taotie</label>
    <textarea id="dinput" placeholder="Enter text to be devoured by the coherence gate...&#10;&#10;All eight domains must resonate above threshold:&#10;syntactic mass · structural complexity · temporal integrity&#10;spatial grounding · directive safety · harmonic avoidance&#10;contextual coherence · spectral near-duplicate detection"></textarea>
    <div class="btn-row">
      <button class="btn-devour" id="bdv" onclick="devour()">&#x2B23; DEVOUR</button>
      <button class="btn-void" onclick="voidState()">VOID</button>
    </div>
  </div>

  <div class="error-note" id="err"></div>

  <!-- Resonance Analysis -->
  <div class="divider"><span>Resonance Analysis</span></div>

  <div class="mu-row" id="mu-row" style="display:none">
    <div class="mu-block">
      <div class="mu-key">&#x3BC; GEOMETRIC MEAN</div>
      <div class="mu-val" id="mval">—</div>
    </div>
    <div class="mu-block">
      <div class="mu-key">&#x3C4; THRESHOLD</div>
      <div class="tau-val" id="tval">—</div>
    </div>
    <div class="mu-block">
      <div class="mu-key">VERDICT</div>
      <div class="verdict-val" id="vval">—</div>
    </div>
  </div>

  <div class="domain-grid" id="dgrid"></div>

  <div class="result-banner" id="rbanner">
    <div class="result-title" id="rtitle"></div>
    <div class="result-meta" id="rmeta"></div>
  </div>

  <!-- Offerings -->
  <div class="divider" style="margin-top:40px"><span>Offerings</span></div>
  <div class="offerings-list" id="olist">
    <div style="font-size:10px;color:#2e2e3e;text-align:center;padding:24px">No offerings yet — feed the gate.</div>
  </div>
  <div style="height:20px"></div>

</main>

<div class="sbar">
  <span><span class="sdot"></span>FACE <span class="sv">:7766</span></span>
  <span>n = <span class="sv" id="sb-n">—</span></span>
  <span>|W_v3| = <span class="sv" id="sb-w">—</span></span>
  <span>anchor = <span class="sv" id="sb-root">—</span></span>
</div>

<script>
const FACE = 'http://localhost:7766';
const KERN = 'http://localhost:7767';
const DNAMES = ['Syntactic','Structural','Temporal','Spatial','Directive','Harmonic','Contextual','Spectral'];
const DKEYS  = ['d1','d2','d3','d4','d5','d6','d7','d8'];

let state = {n:0, w:0, tau:0.9960, phase:'Bootstrap', root:null};
let offerings = JSON.parse(localStorage.getItem('gh_offerings')||'[]');
let orbAngle = 0;

function wv3(n){ return Math.sqrt(n*n+16)/17; }
function phi(n){ return (Math.atan2(4,n)*180/Math.PI).toFixed(1); }

// ── Build domain grid ──────────────────────────────────────────────────────
(function buildGrid(){
  const g = document.getElementById('dgrid');
  g.innerHTML = DKEYS.map((k,i)=>`
    <div class="drow">
      <div class="dname">D${i+1} · ${DNAMES[i]}</div>
      <div class="dbar-wrap"><div class="dbar" id="db-${k}"></div><div class="dtau" id="dt-${k}"></div></div>
      <div class="dscore" id="ds-${k}">—</div>
    </div>`).join('');
})();

// ── Orbital animation ──────────────────────────────────────────────────────
(function startOrb(){
  const cv = document.getElementById('orb');
  const cx2 = cv.getContext('2d');
  const W=cv.width, H=cv.height, cx=W/2, cy=H/2, maxR=86;

  function draw(){
    cx2.clearRect(0,0,W,H);
    cx2.fillStyle='#05050a'; cx2.fillRect(0,0,W,H);

    // Ring grid
    [5,10,15,20].forEach(v=>{
      const r=(v/20)*maxR;
      cx2.beginPath(); cx2.arc(cx,cy,r,0,Math.PI*2);
      cx2.strokeStyle=(v===20)?'#252530':'#111118';
      cx2.lineWidth=.6; cx2.stroke();
      cx2.fillStyle='#2a2a38'; cx2.font='7px Space Mono';
      cx2.fillText(v, cx+r+2, cy-2);
    });

    // Unity ring n≈16.52
    const uR=(16.52/20)*maxR;
    cx2.beginPath(); cx2.arc(cx,cy,uR,0,Math.PI*2);
    cx2.strokeStyle='rgba(200,168,75,.25)';
    cx2.lineWidth=1; cx2.setLineDash([2,4]); cx2.stroke(); cx2.setLineDash([]);
    cx2.fillStyle='rgba(200,168,75,.5)'; cx2.font='7px Space Mono';
    cx2.fillText('n*', cx+uR+2, cy-2);

    // Current orbit
    const n=state.n;
    const r=Math.min((n/20)*maxR, maxR);
    orbAngle += 0.004;
    const pAngle = Math.atan2(4, Math.max(n,.1));
    const dotA = orbAngle + pAngle;

    if(n>0){
      cx2.beginPath(); cx2.arc(cx,cy,r,0,Math.PI*2);
      cx2.strokeStyle='rgba(95,255,212,.12)'; cx2.lineWidth=1; cx2.stroke();
      // Trail
      for(let i=0;i<14;i++){
        const ta=dotA-i*.14;
        cx2.beginPath();
        cx2.arc(cx+r*Math.cos(ta), cy+r*Math.sin(ta), 2.2-i*.13, 0, Math.PI*2);
        cx2.fillStyle=`rgba(95,255,212,${.45-i*.032})`; cx2.fill();
      }
      // Dot
      const dx=cx+r*Math.cos(dotA), dy=cy+r*Math.sin(dotA);
      cx2.beginPath(); cx2.arc(dx,dy,4,0,Math.PI*2);
      cx2.fillStyle='#5fffd4'; cx2.shadowBlur=12; cx2.shadowColor='#5fffd4';
      cx2.fill(); cx2.shadowBlur=0;
    }

    // Center
    cx2.beginPath(); cx2.arc(cx,cy,3,0,Math.PI*2);
    cx2.fillStyle='rgba(200,168,75,.6)'; cx2.fill();

    // Update readouts
    const wc=wv3(n);
    document.getElementById('sn').textContent=n;
    document.getElementById('sw').textContent=wc.toFixed(4);
    document.getElementById('sphi').textContent=phi(n);
    document.getElementById('stau').textContent=state.tau.toFixed(4);
    document.getElementById('sphase').textContent=state.phase;

    requestAnimationFrame(draw);
  }
  draw();
})();

// ── State polling ──────────────────────────────────────────────────────────
async function fetchState(){
  for(const url of [KERN+'/bench', FACE+'/state']){
    try{
      const r=await fetch(url,{signal:AbortSignal.timeout(2000)});
      if(r.ok){ applyState(await r.json()); return; }
    }catch(e){}
  }
}
function applyState(d){
  const n=d.n??d.nodeCount??state.n;
  state={
    n, w:wv3(n),
    tau:d.tau??(n<10?.9960:.9995),
    phase:n<10?'Bootstrap':'Production',
    root:d.merkleRoot??d.chainRoot??null
  };
  document.getElementById('sb-n').textContent=n;
  document.getElementById('sb-w').textContent=state.w.toFixed(4);
  document.getElementById('sb-root').textContent=state.root?state.root.slice(0,12)+'…':'—';
}
fetchState(); setInterval(fetchState,5000);

// ── Devour ─────────────────────────────────────────────────────────────────
async function devour(){
  const txt=document.getElementById('dinput').value.trim();
  if(!txt) return;
  const btn=document.getElementById('bdv');
  const taotie=document.getElementById('taotie');
  btn.textContent='⟳ CONSUMING…'; btn.classList.add('loading');
  document.getElementById('err').style.display='none';
  try{
    const resp=await fetch(FACE+'/devour',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:txt}), signal:AbortSignal.timeout(8000)
    });
    const d=await resp.json();
    applyResult(d, txt, taotie);
  }catch(e){
    document.getElementById('err').textContent='FACE unreachable at :7766 — '+e.message;
    document.getElementById('err').style.display='block';
    taotie.className='taotie-svg taotie-reject';
    setTimeout(()=>taotie.className='taotie-svg taotie-idle',1000);
  }finally{
    btn.textContent='⬡ DEVOUR'; btn.classList.remove('loading');
  }
}

function applyResult(d, txt, taotie){
  const admitted=d.admitted??d.admit??false;
  const mu=d.mu??d.coherence??0;
  const tau=d.tau??state.tau;
  const scores=d.scores??d.domains??{};
  const tier=d.tier??null;
  const vertex=d.vertex??d.tesseractVertex??null;
  const nodeId=d.nodeId??d.id??null;
  const n=d.n??state.n;

  // Update state
  state.n=n; state.tau=tau; state.phase=n<10?'Bootstrap':'Production';
  document.getElementById('sb-n').textContent=n;

  // Taotie
  taotie.className='taotie-svg '+(admitted?'taotie-admit':'taotie-reject');
  setTimeout(()=>taotie.className='taotie-svg taotie-idle',1000);

  // Mu row
  const mrow=document.getElementById('mu-row');
  mrow.style.display='flex';
  document.getElementById('mval').textContent=mu.toFixed(6);
  document.getElementById('mval').style.color=admitted?'var(--gold)':'var(--crimson-b)';
  document.getElementById('tval').textContent=tau.toFixed(4);
  const vv=document.getElementById('vval');
  vv.textContent=admitted?'RESONANCE ACHIEVED':'RESONANCE INSUFFICIENT';
  vv.className='verdict-val '+(admitted?'admit':'reject');

  // Domain bars
  if(Object.keys(scores).length){
    DKEYS.forEach(k=>{
      const sc=scores[k]??scores[k.toUpperCase()];
      if(sc===undefined) return;
      const rng=1-0.990;
      const pct=Math.max(0,Math.min(100,((sc-0.990)/rng)*100));
      const tpct=Math.max(0,Math.min(100,((tau-0.990)/rng)*100));
      const pass=sc>=tau;
      const b=document.getElementById('db-'+k);
      b.style.width=pct+'%'; b.className='dbar '+(pass?'pass':'fail');
      const s=document.getElementById('ds-'+k);
      s.textContent=sc.toFixed(4); s.className='dscore '+(pass?'pass':'fail');
      document.getElementById('dt-'+k).style.left=tpct+'%';
    });
  }

  // Result banner
  const rb=document.getElementById('rbanner');
  rb.className='result-banner '+(admitted?'admit':'reject');
  rb.style.display='block';
  document.getElementById('rtitle').textContent=admitted?'NODE ADMITTED':'DEVOURED AND REJECTED';
  const meta=[];
  if(admitted&&tier) meta.push(`<span class="rk">MEMORY </span><span class="badge ${tier.toLowerCase()}">${tier==='LTM'?'ETERNAL':'EPHEMERAL'}</span>`);
  if(vertex!==null) meta.push(`<span class="rk">VERTEX </span><span class="rv">B⁴(${vertex})</span>`);
  if(nodeId) meta.push(`<span class="rk">NODE </span><span class="rv">${nodeId.toString().slice(0,14)}…</span>`);
  meta.push(`<span class="rk">|W_v3| </span><span class="rv">${wv3(n).toFixed(4)}</span>`);
  document.getElementById('rmeta').innerHTML=meta.join('&nbsp;&nbsp;');

  // Offerings log
  offerings.unshift({admitted,mu:mu.toFixed(6),tier,preview:txt.slice(0,60),ts:new Date().toLocaleTimeString('en-US',{hour12:false})});
  if(offerings.length>20) offerings.pop();
  localStorage.setItem('gh_offerings',JSON.stringify(offerings));
  renderOfferings();
}

function renderOfferings(){
  const el=document.getElementById('olist');
  if(!offerings.length){
    el.innerHTML='<div style="font-size:10px;color:#2e2e3e;text-align:center;padding:24px">No offerings yet — feed the gate.</div>';
    return;
  }
  el.innerHTML=offerings.map(o=>`
    <div class="o-item ${o.admitted?'admit':'reject'}">
      <span class="o-mu">&#x3BC;=${o.mu}</span>
      <span>${o.admitted
        ?`<span class="badge ${(o.tier||'STM').toLowerCase()}">${o.tier==='LTM'?'ETERNAL':'EPHEMERAL'}</span>`
        :'<span style="color:var(--crimson-b);letter-spacing:.1em;font-size:9px">REJECTED</span>'
      }</span>
      <span class="o-preview">${o.preview}${o.preview.length>=60?'…':''}</span>
      <span class="o-time">${o.ts}</span>
    </div>`).join('');
}
renderOfferings();

async function voidState(){
  if(!confirm('INVOKE THE VOID?\n\nKernel state will be reset. The archive survives.')) return;
  try{
    await fetch(FACE+'/reset',{method:'DELETE',signal:AbortSignal.timeout(3000)});
    state={n:0,w:0,tau:.9960,phase:'Bootstrap',root:null};
    ['sb-n','sn'].forEach(id=>document.getElementById(id).textContent='0');
    document.getElementById('sb-root').textContent='—';
    document.getElementById('stau').textContent='0.9960';
    document.getElementById('sphase').textContent='Bootstrap';
  }catch(e){
    document.getElementById('err').textContent='VOID failed — FACE unreachable';
    document.getElementById('err').style.display='block';
  }
}
</script>
